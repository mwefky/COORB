name: COORBAssessment
options:
  bundleIdPrefix: com.minawefky
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"

targets:
  COORBAssessment:
    type: application
    platform: iOS
    sources:
      - path: COORBAssessment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minawefky.COORBAssessment
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "We use your location to suggest a default country."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  COORBAssessmentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: COORBAssessmentTests
    dependencies:
      - target: COORBAssessment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minawefky.COORBAssessmentTests

  COORBAssessmentUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: COORBAssessmentUITests
    dependencies:
      - target: COORBAssessment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minawefky.COORBAssessmentUITests
        TEST_TARGET_NAME: COORBAssessment

schemes:
  COORBAssessment:
    build:
      targets:
        COORBAssessment: all
        COORBAssessmentTests: [test]
        COORBAssessmentUITests: [test]
    test:
      targets:
        - COORBAssessmentTests
        - COORBAssessmentUITests
      gatherCoverageData: true
